name: markdown_widget_flutter_heyteacher
description: Unofficial fork of markdown_widget, a new markdown package. It supports TOC function, code highlighting, and it supports all platforms
version: 2.4.0+1
homepage: https://github.com/heyteacher/markdown_widget
repository: https://github.com/heyteacher/markdown_widget
license: MIT
issue_tracker: https://github.com/heyteacher/markdown_widget/issues
documentation: https://github.com/heyteacher/markdown_widget

topics:
  - markdown
  - flutter
  - widgets

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  #markdown data parser
  markdown: ^7.3.0
  #highlight code
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0


  # to click link
  url_launcher: ^6.3.1
  # to get the index number on scroll for listview
  visibility_detector: ^0.4.0+2
  # make listview available to jump to index
  scroll_to_index: ^3.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  build_runner: ^2.3.3
  path: ^1.8.2
  lints: ^2.1.1
flutter:


screenshots:
  - description: 'Screenshot 1'
    path: screenshots/screenshot.png